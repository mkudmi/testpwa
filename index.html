<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Привет!</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        h1 {
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>Привет!</h1>

    <script>
        // Регистрация сервис-воркера для PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then(function(registration) {
                    console.log('Service Worker зарегистрирован с областью:', registration.scope);
                })
                .catch(function(error) {
                    console.log('Ошибка регистрации Service Worker:', error);
                });
        }

        // Обработка события установки PWA
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;

            const installButton = document.createElement('button');
            installButton.textContent = 'Скачать приложение';
            installButton.style.cssText = 'position: fixed; bottom: 20px; right: 20px; padding: 10px 20px; background-color: #4CAF50; color: white; border-radius: 5px; border: none; cursor: pointer; z-index: 1000;';
            
            document.body.appendChild(installButton);

            installButton.addEventListener('click', () => {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(choiceResult => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('Приложение установлено');
                    } else {
                        console.log('Установка отклонена');
                    }
                    installButton.remove();
                });
            });
        });
    </script>
</body>
</html>
